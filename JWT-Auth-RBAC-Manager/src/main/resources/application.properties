spring.application.name=JWT-Auth-RBAC-Manager

#=========================================
# MySQL Database Configuration
#=========================================
spring.datasource.url=jdbc:mysql://localhost:3306/rbac-manager?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

#=========================================
# JPA/Hibernate Auto Configuration
#=========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#=========================================
# JWT Configuration
#=========================================
jwt.secret=mysupersecretkey
jwt.expiration=3600000

#=========================================
# Logging
#=========================================
logging.level.root=INFO
logging.level.com.api.service=DEBUG
logging.file.name=app.log
